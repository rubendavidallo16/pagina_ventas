<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mi Perfil - Luxe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex min-h-screen w-full flex-col">
        <!-- Top Navigation Bar -->
        <header
            class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 md:px-10 py-3">
            <div class="max-w-[1440px] mx-auto flex items-center justify-between gap-4">
                <div class="flex items-center gap-2 text-primary">
                    <div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
                        <span class="material-symbols-outlined">grid_view</span>
                    </div>
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-extrabold leading-tight tracking-tight">
                        <a href="index.html">LUXE</a>
                    </h2>
                </div>
                <div class="flex items-center gap-3">
                    <a href="index.html"
                        class="flex items-center justify-center rounded-full size-10 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-primary/10 hover:text-primary transition-colors">
                        <span class="material-symbols-outlined">home</span>
                    </a>
                    <a href="carrito.html"
                        class="flex items-center justify-center rounded-full size-10 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-primary/10 hover:text-primary transition-colors relative">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        <span id="cart-count"
                            class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-white">0</span>
                    </a>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-[800px] mx-auto w-full px-4 md:px-10 py-12">
            <div
                class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-2xl border border-slate-200 dark:border-slate-800 p-8 md:p-10">
                <div class="mb-8 flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">Mi Perfil
                        </h1>
                        <p class="text-slate-500 mt-1" id="user-email">Cargando...</p>
                    </div>
                    <button id="btn-logout"
                        class="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors font-bold">
                        <span class="material-symbols-outlined">logout</span>
                        Cerrar Sesión
                    </button>
                </div>

                <form id="profile-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Nombre
                                Completo</label>
                            <input id="profile-name"
                                class="w-full px-4 py-3 bg-background-light dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:text-slate-100"
                                placeholder="Ej. Juan Pérez" type="text" />
                        </div>
                        <div class="space-y-2">
                            <label
                                class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Teléfono</label>
                            <input id="profile-phone"
                                class="w-full px-4 py-3 bg-background-light dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:text-slate-100"
                                placeholder="Ej. +1 234 567 890" type="tel" />
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Dirección de
                            Envío</label>
                        <textarea id="profile-address" rows="3"
                            class="w-full px-4 py-3 bg-background-light dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:text-slate-100 resize-none"
                            placeholder="Ingresa tu dirección completa..."></textarea>
                    </div>

                    <div id="profile-message" class="hidden text-sm p-3 rounded-lg mt-4 font-semibold"></div>

                    <button type="submit"
                        class="w-full flex items-center justify-center gap-2 py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all mt-8">
                        <span class="material-symbols-outlined text-[20px]">save</span>
                        Guardar Cambios
                    </button>
                </form>
            </div>
        </main>

        <!-- Footer -->
        <footer
            class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark py-8 px-6 text-center text-xs text-slate-400">
            © 2024 Luxe Tienda Online. Todos los derechos reservados.
        </footer>
    </div>

    <!-- Scripts de la app -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const btnLogout = document.getElementById('btn-logout');
            const profileForm = document.getElementById('profile-form');
            const msgBox = document.getElementById('profile-message');

            // Verificar sesión activa
            const { data: { user } } = await window.supabaseClient.auth.getUser();

            if (!user) {
                // Si no hay sesión, regresamos a login
                window.location.href = 'login.html';
                return;
            }

            // Mostrar el email del usuario logueado
            document.getElementById('user-email').textContent = user.email;

            // Cargar los datos desde los metadatos de usuario (user_metadata) propios de Authentication
            if (user.user_metadata) {
                document.getElementById('profile-name').value = user.user_metadata.nombre || user.user_metadata.full_name || '';
                document.getElementById('profile-phone').value = user.user_metadata.telefono || '';
                document.getElementById('profile-address').value = user.user_metadata.direccion || '';
            }

            // Guardar o Actualizar Perfil directamente en (Authentication -> Users)
            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                msgBox.classList.add('hidden');

                const nombre = document.getElementById('profile-name').value;
                const telefono = document.getElementById('profile-phone').value;
                const direccion = document.getElementById('profile-address').value;

                try {
                    // Actualizamos la metadata en el servicio de Auth de Supabase
                    const { data, error } = await window.supabaseClient.auth.updateUser({
                        data: {
                            nombre: nombre,
                            telefono: telefono,
                            direccion: direccion
                        }
                    });

                    if (error) throw error;

                    msgBox.textContent = "¡Perfil actualizado exitosamente dentro de Authentication!";
                    msgBox.className = "text-sm p-3 rounded-lg mt-4 font-semibold text-green-700 bg-green-100";
                    msgBox.classList.remove('hidden');

                } catch (error) {
                    console.error('Error al guardar:', error);
                    msgBox.textContent = "Error al guardar. " + error.message;
                    msgBox.className = "text-sm p-3 rounded-lg mt-4 font-semibold text-red-700 bg-red-100";
                    msgBox.classList.remove('hidden');
                }
            });

            // Cerrar Sesión
            btnLogout.addEventListener('click', async () => {
                const { error } = await window.supabaseClient.auth.signOut();
                if (!error) {
                    window.location.href = 'login.html';
                }
            });

            // Inicializar carrito local count
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const contador = document.getElementById('cart-count');
            if (contador) {
                contador.textContent = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            }
        });
    </script>
</body>

</html>
