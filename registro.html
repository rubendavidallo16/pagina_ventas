<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Registro - Luxe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
    <div class="relative flex min-h-screen flex-col items-center justify-center p-4">
        <header class="absolute top-0 left-0 right-0 flex items-center justify-between px-6 py-6 lg:px-12">
            <div class="flex items-center gap-2 text-primary">
                <span class="material-symbols-outlined text-3xl font-bold">shopping_bag</span>
                <h1 class="text-xl font-extrabold tracking-tight"><a href="index.html">LUXE</a></h1>
            </div>
            <div class="hidden md:block">
                <span class="text-slate-500 dark:text-slate-400 text-sm mr-2">¿Ya tienes una cuenta?</span>
                <a class="text-primary font-bold text-sm hover:underline" href="login.html">Inicia sesión</a>
            </div>
        </header>

        <main class="w-full max-w-[480px] mt-24 mb-12 relative z-10">
            <div
                class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-xl border border-slate-200 dark:border-slate-800 p-8 md:p-10">
                <div class="mb-8">
                    <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 leading-tight tracking-tight">
                        Crear Cuenta</h2>
                    <p class="text-slate-500 dark:text-slate-400 mt-2">Únete a nuestra comunidad para una experiencia de
                        compra única.</p>
                </div>

                <form id="register-form" class="space-y-5">
                    <!-- Nombre omitido momentáneamente de Supabase auth basic, pero útil para tabla perfiles si existe -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Nombre
                            Completo</label>
                        <div class="relative">
                            <input id="name" required
                                class="w-full px-4 py-3.5 bg-background-light dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                type="text" />
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Correo
                            Electrónico</label>
                        <div class="relative">
                            <input id="email" required
                                class="w-full px-4 py-3.5 bg-background-light dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                type="email" />
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Contraseña</label>
                        <div class="relative flex items-center">
                            <input id="password" required
                                class="w-full px-4 py-3.5 bg-background-light dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                type="password" />
                        </div>
                    </div>

                    <div id="register-error" class="hidden text-sm text-red-500 bg-red-100 p-2 rounded"></div>
                    <div id="register-success" class="hidden text-sm text-green-600 bg-green-100 p-2 rounded"></div>

                    <button
                        class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group mt-4">
                        <span>Crear Cuenta</span>
                        <span
                            class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </form>
            </div>

            <p class="text-center mt-8 text-slate-500 dark:text-slate-400 text-sm">
                © 2024 Luxe. Diseñado para la elegancia.
            </p>
        </main>

        <div class="fixed bottom-0 right-0 p-8 pointer-events-none opacity-10">
            <svg class="w-64 h-64 text-primary" fill="currentColor" viewbox="0 0 100 100">
                <circle cx="50" cy="50" r="40"></circle>
            </svg>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            const errorDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            // Lógica de registro con Supabase Auth
            const { data, error } = await window.supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name
                    }
                }
            });

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            } else {
                successDiv.textContent = "Registro exitoso. Revisa tu correo (si requieres confirmación) o inicia sesión.";
                successDiv.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        });
    </script>
</body>

</html>
