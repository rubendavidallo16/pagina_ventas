<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Carrito - Luxe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Navigation -->
        <header
            class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-20 py-4 sticky top-0 z-50">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2 text-primary">
                    <span class="material-symbols-outlined text-3xl font-bold">shopping_bag</span>
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-extrabold leading-tight tracking-tight">
                        <a href="index.html">LUXE</a>
                    </h2>
                </div>
                <nav class="hidden md:flex items-center gap-8">
                    <a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-semibold transition-colors"
                        href="index.html">Tienda</a>
                </nav>
            </div>
            <div class="flex flex-1 justify-end gap-6 items-center">
                <a href="carrito.html"
                    class="relative flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span id="cart-count-header"
                        class="absolute -top-1 -right-1 bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                </a>
            </div>
        </header>

        <main class="max-w-7xl mx-auto w-full px-6 md:px-20 py-8">
            <!-- Breadcrumbs -->
            <div class="flex items-center gap-2 mb-8 text-sm">
                <a class="text-slate-500 hover:text-primary transition-colors font-medium" href="index.html">Inicio</a>
                <span class="material-symbols-outlined text-slate-400 text-xs">chevron_right</span>
                <span class="text-slate-900 dark:text-slate-100 font-semibold">Carrito de Compras</span>
            </div>

            <div class="flex flex-col lg:flex-row gap-12">
                <!-- Cart Items Section -->
                <div class="flex-1">
                    <div class="mb-8">
                        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100 mb-2">Tu
                            Carrito</h1>
                        <p class="text-slate-500 dark:text-slate-400">Tienes <span id="cart-item-count-text"
                                class="text-primary font-bold">0 productos</span> en tu bolsa.</p>
                    </div>

                    <div id="carrito-contenedor" class="space-y-6">
                        <!-- Los items del carrito se renderizarán dinámicamente aquí. Mock temporal: -->
                        <div
                            class="flex flex-col sm:flex-row gap-6 bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm transition-all hover:shadow-md">
                            <div class="shrink-0">
                                <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-32 border border-slate-100 dark:border-slate-800"
                                    style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAKZy58ffdXa_5t-O8EXStCvCc0s79ljuzrqTIYhTbGzFc3oN2ULHdwDgMBgoaXoqCFcdyQxtp60ieI6QxBU3wlMdIiQPVXzvvz21GX5yeLAQ48PHq4IKNAgB5aVjHrvVHDdRftKvHLbrC58pq5Fe-r-wkZv57VyFCK1G9YD3E9oj-gxr4uKWruAhk2CH1yBJoUupJ449TuIq9-mIuZVVmrnfkhpgVPLN7NMzC2BMMi4gDAv98eENb1co3zVMkwfA6eMowtDbbG_6U");'>
                                </div>
                            </div>
                            <div class="flex flex-1 flex-col justify-between">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 leading-tight">
                                            Premium Cotton Tee</h3>
                                    </div>
                                    <p class="text-lg font-bold text-slate-900 dark:text-slate-100">$45.00</p>
                                </div>
                                <div class="flex items-center justify-between mt-4 sm:mt-0">
                                    <div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
                                        <button
                                            class="flex h-8 w-8 items-center justify-center rounded-md hover:bg-white dark:hover:bg-slate-700 transition-colors">
                                            <span class="material-symbols-outlined text-sm">remove</span>
                                        </button>
                                        <span class="text-sm font-bold w-4 text-center">1</span>
                                        <button
                                            class="flex h-8 w-8 items-center justify-center rounded-md hover:bg-white dark:hover:bg-slate-700 transition-colors">
                                            <span class="material-symbols-outlined text-sm">add</span>
                                        </button>
                                    </div>
                                    <button
                                        class="text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1 text-xs font-bold uppercase tracking-wider">
                                        <span class="material-symbols-outlined text-lg">delete</span>
                                        Eliminar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8">
                        <a href="index.html"
                            class="flex items-center gap-2 text-primary font-bold hover:gap-3 transition-all">
                            <span class="material-symbols-outlined">arrow_downward</span>
                            Continuar Comprando
                        </a>
                    </div>
                </div>

                <!-- Order Summary Section -->
                <div class="w-full lg:w-[400px]">
                    <div
                        class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 p-8 sticky top-28 shadow-sm">
                        <h2 class="text-xl font-extrabold text-slate-900 dark:text-slate-100 mb-6">Resumen de Compra
                        </h2>
                        <div class="space-y-4 mb-6 border-b border-slate-100 dark:border-slate-800 pb-6">
                            <div class="flex justify-between text-slate-600 dark:text-slate-400">
                                <span class="font-medium">Subtotal</span>
                                <span id="cart-subtotal"
                                    class="font-bold text-slate-900 dark:text-slate-100">$0.00</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-center mb-8">
                            <span class="text-lg font-bold text-slate-900 dark:text-slate-100">Total</span>
                            <div class="text-right">
                                <span id="cart-total" class="text-3xl font-extrabold text-primary">$0.00</span>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <button
                                class="w-full py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary/90 transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
                                <span class="material-symbols-outlined">lock</span>
                                Proceder al Pago
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-auto border-t border-slate-100 dark:border-slate-800 py-8 text-center">
            <p class="text-slate-400 text-sm font-medium">© 2024 LUXE E-COMMERCE. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <!-- Scripts de la app -->
    <script src="js/api.js"></script>
    <script src="js/carrito.js"></script>
</body>

</html>
