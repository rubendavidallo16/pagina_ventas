<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión - Luxe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Navigation -->
    <header
        class="w-full px-6 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="text-primary">
                <span class="material-symbols-outlined text-3xl font-bold">shopping_bag</span>
            </div>
            <h1 class="text-xl font-bold tracking-tight"><a href="index.html">LUXE</a></h1>
        </div>
        <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
            <a class="hover:text-primary transition-colors" href="index.html">Shop</a>
        </nav>
        <div class="flex items-center gap-4">
            <a href="carrito.html"
                class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors relative">
                <span class="material-symbols-outlined">shopping_bag</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div
            class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 overflow-hidden">
            <!-- Header Image/Banner -->
            <div class="h-32 w-full bg-primary/10 relative flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-transparent"></div>
                <div class="relative z-10 flex flex-col items-center">
                    <div
                        class="w-12 h-12 bg-white dark:bg-slate-900 rounded-full flex items-center justify-center shadow-sm text-primary mb-2">
                        <span class="material-symbols-outlined text-3xl">lock_open</span>
                    </div>
                </div>
            </div>
            <div class="p-8">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold mb-2">Bienvenido de nuevo</h2>
                    <p class="text-slate-500 dark:text-slate-400">Inicia sesión para continuar comprando.</p>
                </div>
                <!-- Login Form -->
                <form id="login-form" class="space-y-5">
                    <div class="space-y-1.5">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Correo
                            Electrónico</label>
                        <div class="relative group">
                            <input required
                                class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                id="email" type="email" />
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300"
                                for="password">Contraseña</label>
                            <a class="text-xs font-medium text-primary hover:underline" href="#">¿Olvidaste tu
                                contraseña?</a>
                        </div>
                        <div class="relative group">
                            <input required
                                class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                id="password" type="password" />
                        </div>
                    </div>

                    <div id="login-error" class="hidden text-sm text-red-500 bg-red-100 p-2 rounded"></div>

                    <button
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg transition-all shadow-lg shadow-primary/25 active:scale-[0.98] mt-2"
                        type="submit">
                        Iniciar Sesión
                    </button>
                </form>

                <!-- Create Account Link -->
                <div class="mt-8 text-center">
                    <p class="text-slate-600 dark:text-slate-400 text-sm">
                        ¿No tienes una cuenta?
                        <a class="text-primary font-bold hover:underline ml-1" href="registro.html">Regístrate aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-8 px-6 text-center text-slate-500 dark:text-slate-400 text-sm">
        <p>© 2024 Luxe. Todos los derechos reservados.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            errorDiv.classList.add('hidden');

            // Lógica de inicio de sesión con Supabase Auth
            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            } else {
                window.location.href = 'index.html'; // Redirigir al inicio en éxito
            }
        });
    </script>
</body>

</html>
